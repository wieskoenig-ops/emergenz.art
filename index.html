<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emergenz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: 'Cormorant Garamond', serif;
    }

    #layout {
      position: fixed; inset: 0;
      display: grid;
      grid-template-rows: 1fr 2fr 1fr;
    }

    .band {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      position: relative;
    }

    .cell {
      position: relative;
      cursor: pointer;
      transition: background 1s ease;
      text-decoration: none;
      display: block;
    }
    .cell.clicked { background: rgba(30,30,30,0.92) !important; }

    .cell::after {
      content: '';
      position: absolute; inset: 0;
      border: 0.5px solid rgba(232,224,208,0);
      transition: border-color 0.4s ease;
      pointer-events: none;
    }
    .cell:hover::after { border-color: rgba(232,224,208,0.25); }

    /* Labels — immer schwach sichtbar, bei Hover deutlich */
    .cell-label {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(0.85rem, 1.6vw, 1.3rem);
      letter-spacing: 0.28em;
      color: rgba(232,224,208,0.12);
      text-transform: lowercase;
      transition: color 0.5s ease;
      pointer-events: none;
      user-select: none;
      text-align: center;
    }
    .cell:hover .cell-label { color: rgba(232,224,208,0.75); }

    /* Block 2 Start — dauerhaft hell */
    #c1 .cell-label {
      color: rgba(232,224,208,0.65) !important;
      font-size: clamp(1rem, 1.8vw, 1.5rem);
    }
    #c1:hover .cell-label { color: rgba(232,224,208,1) !important; }

    /* Mitte EMERGENZ */
    #middle {
      position: relative;
      display: flex; align-items: center; justify-content: center;
    }

    #word {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(3rem, 12vw, 9rem);
      letter-spacing: 0.35em;
      color: #e8e0d0;
      text-transform: uppercase;
      user-select: none;
      cursor: default;
      animation: breathe 10s ease-in-out infinite;
      transition: opacity 3s ease;
      white-space: nowrap;
      position: relative; z-index: 2;
    }
    #word.hidden { opacity: 0; pointer-events: none; }

    @keyframes breathe {
      0%   { opacity: 0.1; }
      50%  { opacity: 1; }
      100% { opacity: 0.1; }
    }

    #label-name {
      position: fixed; bottom: 0; right: 0;
      padding-bottom: clamp(8px, 2vh, 24px);
      padding-right: clamp(12px, 2vw, 32px);
      font-family: 'Cormorant Garamond', serif; font-weight: 300;
      font-size: clamp(0.75rem, 1.3vw, 1rem); letter-spacing: 0.28em;
      color: #7a3a20; text-transform: lowercase;
      pointer-events: none; z-index: 10;
    }

    #canvas {
      position: fixed; inset: 0; width: 100%; height: 100%;
      opacity: 0; transition: opacity 1.2s ease;
      pointer-events: none; z-index: 5;
    }
    #canvas.visible { opacity: 1; }

    #sparks {
      position: fixed; inset: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 4;
    }
  </style>
</head>
<body>

  <div id="label-name">mkoenighaus</div>
  <canvas id="sparks"></canvas>
  <canvas id="canvas"></canvas>

  <div id="layout">
    <div class="band" id="band-top">
      <a class="cell" id="c0" href="/ueber/"><span class="cell-label">über emergenz.art</span></a>
      <a class="cell" id="c1" href="/start/"><span class="cell-label">start</span></a>
      <a class="cell" id="c2" href="/mathematik/"><span class="cell-label">mathematik</span></a>
    </div>

    <div id="middle">
      <span id="word">Emergenz</span>
    </div>

    <div class="band" id="band-bot">
      <a class="cell" id="c3" href="/literatur/"><span class="cell-label">literatur</span></a>
      <a class="cell" id="c4" href="/links/"><span class="cell-label">links</span></a>
      <a class="cell" id="c5" href="mailto:mail.emergenz@wrb.de"><span class="cell-label">kontakt</span></a>
    </div>
  </div>

<script>
// ══════════════════════════════════════════
//  SPARKS
// ══════════════════════════════════════════
const sparkCanvas = document.getElementById('sparks');
const sc = sparkCanvas.getContext('2d');
let sparks = [];

// Perkolations-Farbtöne + Weiß
const SPARK_COLORS = [
  [255,255,255],   // weiß
  [255,255,255],   // weiß (häufiger)
  [255,255,255],   // weiß
  [100,160,230],   // Indigo-Blau
  [20,180,160],    // Teal
  [220,140,40],    // Amber
];

function spawnBorderSparks(pos, axis, bandRect, intense) {
  const count = intense
    ? 60 + Math.floor(Math.random() * 40)
    : 12 + Math.floor(Math.random() * 8);

  for (let i = 0; i < count; i++) {
    let x, y, vx, vy;
    const col = SPARK_COLORS[Math.floor(Math.random() * SPARK_COLORS.length)];
    const speed = intense
      ? 1.5 + Math.random() * 5
      : 0.8 + Math.random() * 2;

    if (axis === 'v') {
      x = pos;
      y = bandRect.top + Math.random() * bandRect.height;
      const dir = Math.random() < 0.5 ? -1 : 1;
      vx = dir * speed;
      vy = (Math.random() - 0.5) * speed * 0.8;
    } else {
      x = bandRect.left + Math.random() * bandRect.width;
      y = pos;
      vx = (Math.random() - 0.5) * speed * 0.8;
      const dir = Math.random() < 0.5 ? -1 : 1;
      vy = dir * speed;
    }
    sparks.push({
      x, y, vx, vy, col,
      life: 1,
      decay: intense
        ? 0.012 + Math.random() * 0.018
        : 0.04  + Math.random() * 0.04,
      len: intense
        ? 5 + Math.random() * 12
        : 2 + Math.random() * 4
    });
  }
}

function animateSparks() {
  sc.clearRect(0, 0, sparkCanvas.width, sparkCanvas.height);
  sparks = sparks.filter(s => s.life > 0);
  for (const s of sparks) {
    const [r,g,b] = s.col;
    sc.save();
    sc.globalAlpha = s.life;
    sc.strokeStyle = `rgba(${r},${g},${b},${s.life})`;
    sc.lineWidth = 0.8 + s.life * 0.6;
    sc.shadowColor = `rgba(${r},${g},${b},0.9)`;
    sc.shadowBlur = 6;
    sc.beginPath();
    sc.moveTo(s.x, s.y);
    sc.lineTo(s.x + s.vx * s.len, s.y + s.vy * s.len);
    sc.stroke();
    sc.restore();
    s.x += s.vx;
    s.y += s.vy;
    s.life -= s.decay;
  }
  requestAnimationFrame(animateSparks);
}
animateSparks();

function resizeSparks() {
  sparkCanvas.width  = window.innerWidth;
  sparkCanvas.height = window.innerHeight;
}
resizeSparks();
window.addEventListener('resize', resizeSparks);

const cellNeighborBorders = {
  'c0': ['right'],
  'c1': ['left', 'right'],
  'c2': ['left'],
  'c3': ['right'],
  'c4': ['left', 'right'],
  'c5': ['left'],
};

const cells = document.querySelectorAll('.cell');
const leaveTimers = {};

cells.forEach(cell => {
  const id = cell.id;

  cell.addEventListener('mouseenter', () => {
    if (leaveTimers[id]) { clearTimeout(leaveTimers[id]); delete leaveTimers[id]; }
    const r = cell.getBoundingClientRect();
    const borders = cellNeighborBorders[id] || [];
    borders.forEach(side => {
      spawnBorderSparks(side === 'left' ? r.left : r.right, 'v', r, false);
    });
  });

  cell.addEventListener('mouseleave', () => {
    leaveTimers[id] = setTimeout(() => {
      cell.classList.remove('clicked');
      delete leaveTimers[id];
    }, 1000);
  });

  cell.addEventListener('click', e => {
    // Intensive Funken an allen Nachbargrenzen beim Klick
    const r = cell.getBoundingClientRect();
    const borders = cellNeighborBorders[id] || [];
    borders.forEach(side => {
      spawnBorderSparks(side === 'left' ? r.left : r.right, 'v', r, true);
    });
    cell.classList.add('clicked');
    // Für mailto: kein preventDefault nötig
    // Für interne Links: kurze Verzögerung damit Funken sichtbar sind
    const href = cell.getAttribute('href');
    if (href && !href.startsWith('mailto:')) {
      e.preventDefault();
      setTimeout(() => { window.location.href = href; }, 320);
    }
  });
});

// ══════════════════════════════════════════
//  BOID SCHWARM
// ══════════════════════════════════════════
const canvas  = document.getElementById('canvas');
const ctx     = canvas.getContext('2d');
const word    = document.getElementById('word');

const NUM_BOIDS    = 420;
const FLOCK_FRAMES = 520;
const FORM_FRAMES  = 260;
const HOLD_FRAMES  = 180;

let W, H, boids = [], phase = 'idle', phaseTimer = 0;
let animId = null;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

function sampleWordPoints(text, count) {
  const off = document.createElement('canvas');
  const fontSize = Math.min(W * 0.18, H * 0.28, 160);
  off.width = W; off.height = H;
  const c = off.getContext('2d');
  c.fillStyle = '#fff';
  c.font = `300 ${fontSize}px 'Cormorant Garamond', serif`;
  c.textBaseline = 'middle'; c.textAlign = 'center';
  c.fillText(text, W/2, H/2);
  const data = c.getImageData(0,0,W,H).data;
  const pts = [];
  for (let y=0;y<H;y+=3) for (let x=0;x<W;x+=3)
    if (data[(y*W+x)*4+3]>128) pts.push([x,y]);
  for (let i=pts.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1));
    [pts[i],pts[j]]=[pts[j],pts[i]];
  }
  return pts.slice(0,count);
}

function makeBoid() {
  const edge=Math.floor(Math.random()*4);
  let x,y;
  if(edge===0){x=Math.random()*W;y=-10;}
  else if(edge===1){x=Math.random()*W;y=H+10;}
  else if(edge===2){x=-10;y=Math.random()*H;}
  else{x=W+10;y=Math.random()*H;}
  const a=Math.random()*Math.PI*2,s=1.5+Math.random()*2;
  return{x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,tx:0,ty:0};
}
function initBoids(){boids=Array.from({length:NUM_BOIDS},makeBoid);}

const VR=70,AD=22,MAXS=3.2,MINS=1.0;
function stepFlock(){
  for(const b of boids){
    let avgVx=0,avgVy=0,avgX=0,avgY=0,sepX=0,sepY=0,n=0;
    for(const o of boids){
      if(o===b)continue;
      const dx=o.x-b.x,dy=o.y-b.y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<VR){avgVx+=o.vx;avgVy+=o.vy;avgX+=o.x;avgY+=o.y;n++;
        if(d<AD){sepX-=dx/(d+0.1);sepY-=dy/(d+0.1);}}
    }
    if(n>0){b.vx+=(avgVx/n-b.vx)*0.04;b.vy+=(avgVy/n-b.vy)*0.04;
      b.vx+=(avgX/n-b.x)*0.003;b.vy+=(avgY/n-b.y)*0.003;}
    b.vx+=sepX*0.06;b.vy+=sepY*0.06;
    const m=80;
    if(b.x<m)b.vx+=0.4;if(b.x>W-m)b.vx-=0.4;
    if(b.y<m)b.vy+=0.4;if(b.y>H-m)b.vy-=0.4;
    const spd=Math.sqrt(b.vx*b.vx+b.vy*b.vy)||0.001;
    if(spd>MAXS){b.vx=b.vx/spd*MAXS;b.vy=b.vy/spd*MAXS;}
    if(spd<MINS){b.vx=b.vx/spd*MINS;b.vy=b.vy/spd*MINS;}
    b.x+=b.vx;b.y+=b.vy;
  }
}

function stepForm(t){
  const ease=t<1?t*t*(3-2*t):1;
  for(const b of boids){
    const dx=b.tx-b.x,dy=b.ty-b.y;
    b.vx+=dx*0.05*ease;b.vy+=dy*0.05*ease;
    const spd=Math.sqrt(b.vx*b.vx+b.vy*b.vy)||0.001;
    const maxS=4+ease*7;
    if(spd>maxS){b.vx=b.vx/spd*maxS;b.vy=b.vy/spd*maxS;}
    b.vx*=0.87;b.vy*=0.87;b.x+=b.vx;b.y+=b.vy;
  }
}

function draw(){
  ctx.fillStyle='rgba(0,0,0,0.20)';
  ctx.fillRect(0,0,W,H);
  const t=phaseTimer;
  if(phase==='flock'){
    stepFlock();
    if(t>FLOCK_FRAMES){
      phase='form';phaseTimer=0;
      const pts=sampleWordPoints('EMERGENZ',NUM_BOIDS);
      boids.forEach((b,i)=>{b.tx=pts[i]?pts[i][0]:W/2;b.ty=pts[i]?pts[i][1]:H/2;});
    }
  } else if(phase==='form'){
    stepForm(t/FORM_FRAMES);
    if(t>FORM_FRAMES){phase='hold';phaseTimer=0;}
  } else if(phase==='hold'){
    stepForm(1);
    if(t>HOLD_FRAMES){phase='done';phaseTimer=0;}
  } else if(phase==='done'){
    stepFlock();
    if(t===1){
      word.style.animation='none';word.style.opacity='0';
      word.classList.remove('hidden');
      setTimeout(()=>{
        word.style.transition='opacity 4s ease';word.style.opacity='1';
        setTimeout(()=>{word.style.animation='breathe 10s ease-in-out infinite';},4000);
      },50);
    }
    if(t>300){
      canvas.style.transition='opacity 2s ease';canvas.style.opacity='0';
      phase='idle';phaseTimer=0;
      setTimeout(()=>{cancelAnimationFrame(animId);animId=null;},2200);
      return;
    }
  }
  for(const b of boids){
    let alpha=0.85;
    if(phase==='done') alpha=Math.max(0,0.85-phaseTimer/300);
    if(phase==='form'||phase==='hold'){
      const glow=phase==='hold'?1:phaseTimer/FORM_FRAMES;
      ctx.shadowColor=`rgba(232,224,208,${0.5*glow})`;ctx.shadowBlur=3*glow;
      ctx.fillStyle=`rgba(232,224,208,${0.5+0.5*glow})`;
      ctx.beginPath();ctx.arc(b.x,b.y,1.6,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;
    } else {
      const angle=Math.atan2(b.vy,b.vx);
      ctx.save();ctx.translate(b.x,b.y);ctx.rotate(angle);
      ctx.fillStyle=`rgba(232,224,208,${alpha})`;
      ctx.beginPath();ctx.moveTo(3.5,0);ctx.lineTo(-2.5,-1.8);
      ctx.lineTo(-1.2,0);ctx.lineTo(-2.5,1.8);ctx.closePath();ctx.fill();
      ctx.restore();
    }
  }
  phaseTimer++;
  animId=requestAnimationFrame(draw);
}

function startSwarm(){
  if(phase!=='idle') return;
  phase='flock';phaseTimer=0;
  initBoids();
  word.classList.add('hidden');
  canvas.classList.add('visible');canvas.style.opacity='1';
  animId=requestAnimationFrame(draw);
}

word.addEventListener('mouseenter', startSwarm);
word.addEventListener('click', startSwarm);

// ── Unregelmäßiges Pulsieren der Labels ──────────
// c0, c2, c3, c4, c5 — nicht c1 (Start bleibt permanent hell)
const pulseIds = ['c0','c2','c3','c4','c5'];

// Jeder Block bekommt seinen eigenen Takt — zufällig und unabhängig
pulseIds.forEach(id => {
  const el    = document.getElementById(id);
  const label = el.querySelector('.cell-label');

  function schedulePulse() {
    // Nächster Puls in 4–18 Sekunden
    const delay = 4000 + Math.random() * 14000;
    setTimeout(() => {
      // Nur pulsieren wenn nicht gerade hover oder clicked
      if (!el.matches(':hover') && !el.classList.contains('clicked')) {
        // Einblenden
        label.style.transition = 'color 0.6s ease';
        label.style.color      = 'rgba(232,224,208,0.7)';
        // Nach 2–3 Sekunden wieder verblassen
        const hold = 2000 + Math.random() * 1000;
        setTimeout(() => {
          label.style.transition = 'color 1.2s ease';
          label.style.color      = 'rgba(232,224,208,0.12)';
        }, hold);
      }
      schedulePulse(); // nächsten Puls planen
    }, delay);
  }

  // Gestaffelt starten damit nicht alle gleichzeitig pulsieren
  setTimeout(schedulePulse, Math.random() * 6000);
});
</script>
</body>
</html>
