<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emergenz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }

    #canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      opacity: 0;
      transition: opacity 1.2s ease;
      pointer-events: none;
    }
    #canvas.visible { opacity: 1; }

    #word {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(3rem, 12vw, 9rem);
      letter-spacing: 0.35em;
      color: #e8e0d0;
      text-transform: uppercase;
      user-select: none;
      cursor: default;
      animation: breathe 10s ease-in-out infinite;
      transition: opacity 3s ease;
      white-space: nowrap;
    }
    #word.hidden { opacity: 0; pointer-events: none; }

    @keyframes breathe {
      0%   { opacity: 0.1; }
      50%  { opacity: 1; }
      100% { opacity: 0.1; }
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="word">Emergenz</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const word = document.getElementById('word');

const NUM_BOIDS = 420;
const FLOCK_DURATION = 520;   // frames frei fliegen
const FORM_DURATION  = 260;   // frames für Übergang zum Wort
const HOLD_DURATION  = 180;   // frames halten, dann verblassen

let W, H, boids = [], phase = 'idle', phaseTimer = 0, targets = [];
let animId = null;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// --- Schriftpunkte samplen ---
function sampleWordPoints(text, count) {
  const off = document.createElement('canvas');
  const fontSize = Math.min(W * 0.18, H * 0.28, 160);
  off.width  = W;
  off.height = H;
  const c = off.getContext('2d');
  c.fillStyle = '#fff';
  c.font = `300 ${fontSize}px 'Cormorant Garamond', serif`;
  c.textBaseline = 'middle';
  c.textAlign = 'center';
  c.fillText(text, W / 2, H / 2);

  const data = c.getImageData(0, 0, W, H).data;
  const pts = [];
  const step = 3;
  for (let y = 0; y < H; y += step) {
    for (let x = 0; x < W; x += step) {
      if (data[(y * W + x) * 4 + 3] > 128) pts.push([x, y]);
    }
  }
  // shuffle + pick
  for (let i = pts.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pts[i], pts[j]] = [pts[j], pts[i]];
  }
  return pts.slice(0, count);
}

// --- Boid erzeugen ---
function makeBoid() {
  const edge = Math.floor(Math.random() * 4);
  let x, y;
  if (edge === 0) { x = Math.random() * W; y = -10; }
  else if (edge === 1) { x = Math.random() * W; y = H + 10; }
  else if (edge === 2) { x = -10; y = Math.random() * H; }
  else { x = W + 10; y = Math.random() * H; }
  const angle = Math.random() * Math.PI * 2;
  const spd = 1.5 + Math.random() * 2;
  return { x, y, vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd, tx: 0, ty: 0 };
}

function initBoids() {
  boids = Array.from({ length: NUM_BOIDS }, makeBoid);
}

// --- Flocking (Separation, Alignment, Cohesion) ---
const VISUAL_RANGE = 70;
const AVOID_DIST   = 22;
const MAX_SPD      = 3.2;
const MIN_SPD      = 1.0;

function stepFlock() {
  for (const b of boids) {
    let avgVx = 0, avgVy = 0, avgX = 0, avgY = 0;
    let sepX = 0, sepY = 0;
    let neighbors = 0;

    for (const other of boids) {
      if (other === b) continue;
      const dx = other.x - b.x, dy = other.y - b.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < VISUAL_RANGE) {
        avgVx += other.vx; avgVy += other.vy;
        avgX  += other.x;  avgY  += other.y;
        neighbors++;
        if (dist < AVOID_DIST) {
          sepX -= dx / (dist + 0.1);
          sepY -= dy / (dist + 0.1);
        }
      }
    }

    if (neighbors > 0) {
      // Alignment
      b.vx += (avgVx / neighbors - b.vx) * 0.04;
      b.vy += (avgVy / neighbors - b.vy) * 0.04;
      // Cohesion
      b.vx += (avgX / neighbors - b.x) * 0.003;
      b.vy += (avgY / neighbors - b.y) * 0.003;
    }
    // Separation
    b.vx += sepX * 0.06;
    b.vy += sepY * 0.06;

    // Rand meiden
    const margin = 80;
    if (b.x < margin)  b.vx += 0.4;
    if (b.x > W - margin) b.vx -= 0.4;
    if (b.y < margin)  b.vy += 0.4;
    if (b.y > H - margin) b.vy -= 0.4;

    // Geschwindigkeit begrenzen
    const spd = Math.sqrt(b.vx * b.vx + b.vy * b.vy) || 0.001;
    if (spd > MAX_SPD) { b.vx = b.vx / spd * MAX_SPD; b.vy = b.vy / spd * MAX_SPD; }
    if (spd < MIN_SPD) { b.vx = b.vx / spd * MIN_SPD; b.vy = b.vy / spd * MIN_SPD; }

    b.x += b.vx;
    b.y += b.vy;
  }
}

// --- Übergang zum Wort ---
function stepForm(t) {
  const ease = t < 1 ? t * t * (3 - 2 * t) : 1;
  for (const b of boids) {
    const dx = b.tx - b.x, dy = b.ty - b.y;
    b.vx += dx * 0.05 * ease;
    b.vy += dy * 0.05 * ease;
    const spd = Math.sqrt(b.vx * b.vx + b.vy * b.vy) || 0.001;
    const maxS = 4 + ease * 7;
    if (spd > maxS) { b.vx = b.vx / spd * maxS; b.vy = b.vy / spd * maxS; }
    b.vx *= 0.87; b.vy *= 0.87;
    b.x += b.vx; b.y += b.vy;
  }
}

// --- Zeichnen ---
function draw() {
  ctx.fillStyle = 'rgba(0,0,0,0.20)';
  ctx.fillRect(0, 0, W, H);

  const t = phaseTimer;

  if (phase === 'flock') {
    stepFlock();
    if (t > FLOCK_DURATION) {
      phase = 'form';
      phaseTimer = 0;
      targets = sampleWordPoints('EMERGENZ', NUM_BOIDS);
      for (let i = 0; i < boids.length; i++) {
        boids[i].tx = targets[i] ? targets[i][0] : W / 2;
        boids[i].ty = targets[i] ? targets[i][1] : H / 2;
      }
    }
  } else if (phase === 'form') {
    stepForm(t / FORM_DURATION);
    if (t > FORM_DURATION) { phase = 'hold'; phaseTimer = 0; }
  } else if (phase === 'hold') {
    stepForm(1);
    if (t > HOLD_DURATION) { phase = 'done'; phaseTimer = 0; }
  } else if (phase === 'done') {
    // Vögel lösen sich wieder, Wort blendet ein
    stepFlock();
    if (t === 1) {
      // Wort wieder einblenden
      word.style.animation = 'none';
      word.style.opacity = '0';
      word.classList.remove('hidden');
      setTimeout(() => {
        word.style.transition = 'opacity 4s ease';
        word.style.opacity = '1';
        setTimeout(() => {
          word.style.animation = 'breathe 10s ease-in-out infinite';
        }, 4000);
      }, 50);
    }
    if (t > 300) {
      // Schwarm ausblendet, zurück zu idle
      canvas.style.transition = 'opacity 2s ease';
      canvas.style.opacity = '0';
      phase = 'idle';
      phaseTimer = 0;
      setTimeout(() => { cancelAnimationFrame(animId); animId = null; }, 2200);
      return;
    }
  }

  // Boids zeichnen
  for (const b of boids) {
    let alpha = 0.85;
    if (phase === 'done') alpha = Math.max(0, 0.85 - phaseTimer / 300);

    if (phase === 'form' || phase === 'hold') {
      // leuchtende Punkte
      const glow = phase === 'hold' ? 1 : phaseTimer / FORM_DURATION;
      ctx.shadowColor = `rgba(232,224,208,${0.5 * glow})`;
      ctx.shadowBlur = 3 * glow;
      ctx.fillStyle = `rgba(232,224,208,${0.5 + 0.5 * glow})`;
      ctx.beginPath();
      ctx.arc(b.x, b.y, 1.6, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    } else {
      // Vogelform
      const angle = Math.atan2(b.vy, b.vx);
      ctx.save();
      ctx.translate(b.x, b.y);
      ctx.rotate(angle);
      ctx.fillStyle = `rgba(232,224,208,${alpha})`;
      ctx.beginPath();
      ctx.moveTo(3.5, 0);
      ctx.lineTo(-2.5, -1.8);
      ctx.lineTo(-1.2, 0);
      ctx.lineTo(-2.5, 1.8);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }
  }

  phaseTimer++;
  animId = requestAnimationFrame(draw);
}

// --- Starten ---
function startSwarm() {
  if (phase !== 'idle') return;
  phase = 'flock';
  phaseTimer = 0;
  initBoids();
  word.classList.add('hidden');
  canvas.style.transition = 'opacity 1.2s ease';
  canvas.classList.add('visible');
  canvas.style.opacity = '1';
  animId = requestAnimationFrame(draw);
}

word.addEventListener('mouseenter', startSwarm);
word.addEventListener('click', startSwarm);
</script>
</body>
</html>
