<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    #back {
      position: fixed; top: clamp(8px,2vh,20px); left: clamp(12px,2.5vw,32px);
      font-family: "Cormorant Garamond", serif; font-weight: 300;
      font-size: clamp(0.55rem,1vw,0.78rem); letter-spacing: 0.28em;
      color: rgba(232,224,208,0.15); text-transform: lowercase;
      text-decoration: none; transition: color 0.4s ease; z-index: 20;
    }
    #back:hover { color: rgba(232,224,208,0.6); }
    #back::before { content: "← "; letter-spacing: 0; }
    #page-name {
      position: fixed; top: clamp(8px,2vh,20px); right: clamp(12px,2.5vw,32px);
      font-family: "Cormorant Garamond", serif; font-weight: 300;
      font-size: clamp(0.55rem,1vw,0.78rem); letter-spacing: 0.28em;
      color: #7a3a20; text-transform: lowercase; pointer-events: none; z-index: 20;
    }
    #content {
      position: fixed; inset: 0; display: flex; align-items: center;
      justify-content: center; flex-direction: column; gap: 2rem;
      animation: fadein 1.8s ease forwards; opacity: 0;
    }
    @keyframes fadein {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    h1 { font-weight: 300; font-size: clamp(1.8rem,5vw,4rem);
      letter-spacing: 0.3em; color: #e8e0d0; text-transform: lowercase; }
    p { font-weight: 300; font-size: clamp(0.85rem,1.4vw,1.1rem);
      letter-spacing: 0.08em; color: rgba(232,224,208,0.3); font-style: italic;
      max-width: 480px; text-align: center; line-height: 1.8; }
  </style>
</head>
<body>
  <a id="back" href="/start/">start</a>
  <div id="page-name">dissipation</div>
  <div id="content">
    <h1>dissipation</h1>
    <p>Diese Seite wartet noch auf ihren Inhalt.</p>
  </div>
</body>
</html>
